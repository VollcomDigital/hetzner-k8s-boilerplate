apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-llm-observability
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    grafana_folder: "LLM Observability"
  annotations:
    grafana_folder: "LLM Observability"
data:
  llm-observability.json: |-
    # Dashboard JSON content is loaded at deploy time by the install script.
    # Run: kubectl create configmap grafana-dashboard-llm-observability \
    #        --from-file=llm-observability.json=kubernetes/monitoring/dashboards/llm-observability.json \
    #        -n monitoring --dry-run=client -o yaml | kubectl apply -f -
