apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-hetzner-cost
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  hetzner-cost.json: |
    {
      "_comment": "Dashboard JSON is loaded from kubernetes/monitoring/dashboards/hetzner-cost.json",
      "_note": "Apply the full dashboard by running: kubectl create configmap grafana-dashboard-hetzner-cost --namespace monitoring --from-file=hetzner-cost.json=kubernetes/monitoring/dashboards/hetzner-cost.json -o yaml --dry-run=client | kubectl apply -f -"
    }
