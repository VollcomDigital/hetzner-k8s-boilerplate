apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    # Inhibit duplicate alerts (e.g., don't fire NodeDown if ClusterDown)
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity =~ warning|info
        equal:
          - namespace
          - alertname
      - source_matchers:
          - alertname = InfoInhibitor
        target_matchers:
          - severity = info
        equal:
          - namespace

    route:
      group_by: ["namespace", "alertname", "job"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "default"
      routes:
        # Critical alerts → PagerDuty + Slack
        - matchers:
            - severity = critical
          receiver: "critical"
          continue: true
          repeat_interval: 1h

        # Warning alerts → Slack only
        - matchers:
            - severity = warning
          receiver: "warning"
          repeat_interval: 4h

        # Watchdog (deadman switch)
        - matchers:
            - alertname = Watchdog
          receiver: "deadman"
          repeat_interval: 1m

    receivers:
      # Default: catch-all (no notifications unless configured)
      - name: "default"

      # Deadman switch — if this stops firing, alerting pipeline is broken
      - name: "deadman"

      # ---- Slack (uncomment and configure) ----
      - name: "warning"
        # slack_configs:
