# kube-prometheus-stack Helm values
# Ref: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

# -- Global --
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryWorkingSetBytes: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: false  # Disabled — using Cilium kube-proxy replacement
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

# -- Prometheus --
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "45GB"

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 4Gi    # Increased: receives remote_write from Alloy + Tempo metrics generator

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: hcloud-volumes
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    # Accept remote_write from Grafana Alloy (OTel metrics) and
    # Tempo metrics generator (span-metrics, service-graph metrics).
    enableRemoteWriteReceiver: true

    # Scrape all ServiceMonitors across namespaces (Alloy, Loki, Tempo, MinIO)
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Isolate Prometheus on observability nodes
    tolerations:
      - key: dedicated
        operator: Equal
        value: observability
        effect: NoSchedule

    nodeSelector:
      dedicated: observability

    # Additional scrape config for Alloy internal metrics (belt-and-suspenders)
    additionalScrapeConfigs:
      - job_name: alloy-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            regex: otel-collector
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: "true"
            action: keep
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

# -- Alertmanager --
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: hcloud-volumes
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    tolerations:
      - key: dedicated
        operator: Equal
        value: observability
        effect: NoSchedule

    nodeSelector:
      dedicated: observability

# -- Grafana --
grafana:
  adminPassword: ""  # Set via --set at install time or use existing secret

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  persistence:
    enabled: true
    storageClassName: hcloud-volumes
    size: 10Gi

  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule

  nodeSelector:
    dedicated: observability

  # Grafana plugins required for advanced observability features
  plugins:
    - grafana-piechart-panel
    - grafana-clock-panel

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: "Infrastructure"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
        - name: apm
          orgId: 1
          folder: "APM & Tracing"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/apm
        - name: llm
          orgId: 1
          folder: "LLM Observability"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/llm

  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      nginx-ingress:
        gnetId: 14314
        revision: 2
        datasource: Prometheus
      cert-manager:
        gnetId: 11001
        revision: 1
        datasource: Prometheus
      # Grafana Alloy collector health dashboard
      alloy-overview:
        gnetId: 21260
        revision: 1
        datasource: Prometheus
    apm:
      # Tempo / distributed tracing overview
      tempo-overview:
        gnetId: 16611
        revision: 1
        datasource: Prometheus
      # RED metrics generated by Tempo's span-metrics processor
      tempo-red-metrics:
        gnetId: 17685
        revision: 1
        datasource: Prometheus

  sidecar:
    # Load dashboard ConfigMaps across ALL namespaces (picks up custom JSON dashboards)
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
    # Load datasource ConfigMaps across ALL namespaces
    # This auto-registers Tempo (tracing/) and Loki (logging/) datasources.
    datasources:
      enabled: true
      searchNamespace: ALL
      label: grafana_datasource

  ingress:
    enabled: false  # Enable and configure in production

# -- Node Exporter (runs on ALL nodes, tolerates all taints) --
nodeExporter:
  enabled: true
  operatingSystems:
    linux:
      enabled: true

prometheus-node-exporter:
  tolerations:
    - operator: Exists    # Tolerate all taints — we want node metrics everywhere

# -- kube-state-metrics --
kubeStateMetrics:
  enabled: true

kube-state-metrics:
  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule
  nodeSelector:
    dedicated: observability

# -- Kube Controller Manager --
kubeControllerManager:
  enabled: true
  endpoints:
    - 10.0.0.2  # Update with actual control-plane private IPs

# -- Kube Scheduler --
kubeScheduler:
  enabled: true
  endpoints:
    - 10.0.0.2  # Update with actual control-plane private IPs

# -- Kube Etcd --
kubeEtcd:
  enabled: true

# -- Kube Proxy (disabled — Cilium replaces it) --
kubeProxy:
  enabled: false
