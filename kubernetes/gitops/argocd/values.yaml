# ArgoCD Helm values
# Ref: https://github.com/argoproj/argo-helm/tree/main/charts/argo-cd

global:
  domain: argocd.example.com  # Update with your domain

configs:
  params:
    server.insecure: true  # TLS terminated at ingress

  cm:
    url: https://argocd.example.com  # Update with your domain
    resource.exclusions: |
      - apiGroups:
          - cilium.io
        kinds:
          - CiliumIdentity
        clusters:
          - "*"

  rbac:
    policy.default: role:readonly
    policy.csv: |
      g, admins, role:admin

server:
  replicas: 2

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-production
      nginx.ingress.kubernetes.io/ssl-passthrough: "false"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    tls: true

controller:
  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

repoServer:
  replicas: 2

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

applicationSet:
  replicas: 2

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

notifications:
  enabled: true

  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi
