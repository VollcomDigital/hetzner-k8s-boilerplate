# Grafana Alloy Helm values — OTel-native universal collector (DaemonSet)
# Chart: grafana/alloy
# Ref: https://github.com/grafana/alloy/tree/main/operations/helm/charts/alloy
#
# Replaces: Promtail (log collection)
# Adds:     OTLP receiver for traces/metrics/logs from instrumented apps
#
# Runs on all APPLICATION nodes (not observability nodes — no toleration for
# dedicated=observability taint, so it is automatically excluded from them).

alloy:
  # Config loaded from the ConfigMap generated by this chart from configMap.content
  configMap:
    create: true
    # Inline content is populated from the config.alloy file via --set-file at install
    content: ""

  # Environment variables passed to the Alloy pipeline config via env()
  # Credentials and endpoints are injected at install time (never hardcoded).
  extraEnv:
    - name: TEMPO_OTLP_ENDPOINT
      value: "tempo-distributor.tracing.svc.cluster.local:4317"
    - name: PROMETHEUS_REMOTE_WRITE_URL
      value: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
    - name: LOKI_PUSH_URL
      value: "http://loki.logging.svc.cluster.local:3100/loki/api/v1/push"

  # OTLP receiver ports — apps send telemetry here
  listenPort: 4317

  # Stability level: generally-available for production use
  stabilityLevel: "generally-available"

# ----- DaemonSet configuration -----
controller:
  type: daemonset

  # Runs on ALL nodes including control-plane (to capture system component logs).
  # No toleration for dedicated=observability — observability nodes are backends,
  # not sources of application telemetry.
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

  volumes:
    extra:
      # Host log directory — read container logs via file system
      - name: varlogpods
        hostPath:
          path: /var/log/pods
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers

  volumeMounts:
    extra:
      - name: varlogpods
        mountPath: /var/log/pods
        readOnly: true
      - name: varlibdockercontainers
        mountPath: /var/lib/docker/containers
        readOnly: true

# ----- Resources -----
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# ----- RBAC — allow Kubernetes API discovery for log collection + k8sattributes -----
rbac:
  create: true

serviceAccount:
  create: true
  name: alloy

clusterRole:
  create: true
  rules:
    # Pod/namespace discovery for log collection and k8s attribute enrichment
    - apiGroups: [""]
      resources:
        - nodes
        - nodes/proxy
        - services
        - endpoints
        - pods
        - namespaces
      verbs: ["get", "list", "watch"]
    # ServiceMonitor / PodMonitor discovery
    - apiGroups: ["monitoring.coreos.com"]
      resources:
        - servicemonitors
        - podmonitors
      verbs: ["get", "list", "watch"]

# ----- Service — expose OTLP ingestion to in-cluster apps -----
service:
  enabled: true
  type: ClusterIP

extraPorts:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: otlp-http
    port: 4318
    targetPort: 4318
    protocol: TCP

# ----- Prometheus ServiceMonitor for Alloy self-metrics -----
serviceMonitor:
  enabled: true
  namespace: monitoring
  additionalLabels:
    release: kube-prometheus-stack

# ----- Security -----
securityContext:
  privileged: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    # CAP_DAC_READ_SEARCH allows reading /var/log/pods across all UIDs/GIDs
    add:
      - DAC_READ_SEARCH
  readOnlyRootFilesystem: true
  runAsNonRoot: false   # Required to read host log files owned by root
  runAsUser: 0

podLabels:
  app.kubernetes.io/component: otel-collector
  app.kubernetes.io/part-of: observability-stack
