apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-ingress-values
  namespace: ingress-nginx
data:
  values.yaml: |
    controller:
      replicaCount: 2

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 256Mi

      # Use Hetzner Cloud LB via CCM annotations
      service:
        annotations:
          load-balancer.hetzner.cloud/name: "ingress-nginx"
          load-balancer.hetzner.cloud/use-private-ip: "true"
          load-balancer.hetzner.cloud/location: "nbg1"
          load-balancer.hetzner.cloud/type: "lb11"
          load-balancer.hetzner.cloud/health-check-interval: "15"
          load-balancer.hetzner.cloud/health-check-timeout: "10"
          load-balancer.hetzner.cloud/health-check-retries: "3"
          load-balancer.hetzner.cloud/uses-proxyprotocol: "true"

      config:
        use-proxy-protocol: "true"
        use-forwarded-headers: "true"
        compute-full-forwarded-for: "true"
        enable-real-ip: "true"
        # Security headers
        hide-headers: "X-Powered-By,Server"
        ssl-redirect: "true"
        force-ssl-redirect: "true"
        hsts: "true"
        hsts-max-age: "31536000"
        hsts-include-subdomains: "true"
        hsts-preload: "true"

      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          namespace: monitoring

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
              app.kubernetes.io/component: controller

    defaultBackend:
      enabled: true
      replicaCount: 1
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          memory: 32Mi
