apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hubble-ui
  namespace: kube-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: hubble-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Hubble UI - Authentication Required"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - hubble.example.com  # Update with your domain
      secretName: hubble-ui-tls
  rules:
    - host: hubble.example.com  # Update with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hubble-ui
                port:
                  number: 80
---
# Generate the secret:
#   htpasswd -c auth admin
#   kubectl create secret generic hubble-basic-auth --from-file=auth -n kube-system
