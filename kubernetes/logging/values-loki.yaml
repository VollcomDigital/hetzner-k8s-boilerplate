# Loki Helm values
# Chart: grafana/loki
# Ref: https://github.com/grafana/helm-charts/tree/main/charts/loki
#
# Upgraded from SingleBinary/filesystem to SimpleScalable/MinIO for:
#   1. Resilience: data survives pod restarts (object store is durable)
#   2. Node isolation: runs exclusively on observability-tainted nodes
#   3. Separation of concerns: write and read paths scale independently

deploymentMode: SimpleScalable

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 2

  # ----- Storage: MinIO S3-compatible backend -----
  # Credentials must be set via --set at install time.
  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    s3:
      endpoint: http://minio.storage.svc.cluster.local:9000
      region: us-east-1         # MinIO ignores region but Loki requires it
      secretAccessKey: ""       # Set via --set loki.storage.s3.secretAccessKey=<value>
      accessKeyId: ""           # Set via --set loki.storage.s3.accessKeyId=<value>
      s3ForcePathStyle: true
      insecure: true

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  limits_config:
    retention_period: 720h        # 30 days
    max_query_series: 10000
    max_query_parallelism: 4
    ingestion_rate_mb: 20
    ingestion_burst_size_mb: 40
    per_stream_rate_limit: 5MB
    per_stream_rate_limit_burst: 20MB
    # Accept OTLP logs from Alloy in addition to Loki push format
    otlp_config:
      resource_attributes:
        attributes_config:
          - action: index_label
            attributes:
              - service.name
              - service.namespace
              - k8s.namespace.name
              - k8s.pod.name

  compactor:
    retention_enabled: true

# ----- Write path (ingester + distributor) -----
write:
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      memory: 1Gi
  persistence:
    enabled: true
    storageClass: hcloud-volumes
    size: 10Gi     # WAL buffer; actual data goes to MinIO
  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule
  nodeSelector:
    dedicated: observability

# ----- Read path (querier + query-frontend) -----
read:
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      memory: 1Gi
  persistence:
    enabled: true
    storageClass: hcloud-volumes
    size: 5Gi      # BoltDB shipper cache
  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule
  nodeSelector:
    dedicated: observability

# ----- Backend (compactor + ruler + index-gateway) -----
backend:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  persistence:
    enabled: true
    storageClass: hcloud-volumes
    size: 5Gi
  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule
  nodeSelector:
    dedicated: observability

# ----- Gateway (nginx HTTP router) -----
gateway:
  enabled: true
  replicas: 1
  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule
  nodeSelector:
    dedicated: observability

# ----- Monitoring -----
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
  serviceMonitor:
    enabled: true
    namespace: monitoring
    additionalLabels:
      release: kube-prometheus-stack

test:
  enabled: false
