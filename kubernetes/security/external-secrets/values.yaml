# External Secrets Operator Helm values
# Ref: https://github.com/external-secrets/external-secrets/tree/main/deploy/charts/external-secrets

replicaCount: 2

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

webhook:
  replicaCount: 2
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

certController:
  replicaCount: 1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

serviceMonitor:
  enabled: true
  namespace: monitoring
